<h2 class="modal__headline" data-result-title></h2>
<p class="modal__text">
    <span data-result-score-label></span>
    <strong data-result-score></strong>
    (<span data-result-solved></span> von <span data-result-total></span> Fragen richtig)
</p>
<p class="modal__text">
    <span data-result-max-label></span>
    <strong data-result-max></strong>
</p>
<div class="modal__result_extra">
    <h3 class="modal__result_extra_headline">Legende</h3>
    <p><small>Fragen, die im zweiten Versuch richtig beantwortet wurden,
        bringen nur noch 1 Punkte.
    </small></p>
    <div class="modal__result_extra_content">
        <div class="modal__result_extra_row">
            <div class="modal__result_extra_content_normal">Normale Fragen:</div>
            <div>2 Punkte</div>
        </div>
        <div class="modal__result_extra_row">
            <div class="modal__result_extra_content_medium">Schwierige Fragen:</div>
            <div>3 Punkte</div>
        </div>
        <div class="modal__result_extra_row">
            <div class="modal__result_extra_content_hero">Hero-Fragen:</div>
            <div>5 Punkte</div>
        </div>
    </div>
</div>
