services:
  app:
    build: .
    ports:
      - "${QUIZ_HERO_APP_PORT:-8080}:80"
    environment:
      QUIZ_HERO_DB_HOST: mysql
      QUIZ_HERO_DB_PORT: 3306
      QUIZ_HERO_DB_NAME: ${QUIZ_HERO_DB_NAME:-quiz_hero}
      QUIZ_HERO_DB_USER: ${QUIZ_HERO_DB_USER:-quiz_hero}
      QUIZ_HERO_DB_PASSWORD: ${QUIZ_HERO_DB_PASSWORD:-quiz_hero_local}
      QUIZ_HERO_ADMIN_USER: ${QUIZ_HERO_ADMIN_USER:-admin}
      QUIZ_HERO_ADMIN_PASSWORD: ${QUIZ_HERO_ADMIN_PASSWORD:-admin123}
      QUIZ_HERO_USER_TOKEN_SECRET: ${QUIZ_HERO_USER_TOKEN_SECRET:-quiz_hero_local_user_token_secret}
      QUIZ_HERO_SEO_EXPORT_TOKEN: ${QUIZ_HERO_SEO_EXPORT_TOKEN:-quiz_hero_local_seo_export_token}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${QUIZ_HERO_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${QUIZ_HERO_DB_NAME:-quiz_hero}
      MYSQL_USER: ${QUIZ_HERO_DB_USER:-quiz_hero}
      MYSQL_PASSWORD: ${QUIZ_HERO_DB_PASSWORD:-quiz_hero_local}
      MYSQL_ROOT_PASSWORD: ${QUIZ_HERO_DB_ROOT_PASSWORD:-quiz_hero_root_local}
    volumes:
      - quiz_hero_mysql:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  seed:
    build: .
    profiles:
      - tools
    environment:
      QUIZ_HERO_DB_HOST: mysql
      QUIZ_HERO_DB_PORT: 3306
      QUIZ_HERO_DB_NAME: ${QUIZ_HERO_DB_NAME:-quiz_hero}
      QUIZ_HERO_DB_USER: ${QUIZ_HERO_DB_USER:-quiz_hero}
      QUIZ_HERO_DB_PASSWORD: ${QUIZ_HERO_DB_PASSWORD:-quiz_hero_local}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: php database/seed-from-json.php

  migrate:
    build: .
    profiles:
      - tools
    environment:
      QUIZ_HERO_DB_HOST: mysql
      QUIZ_HERO_DB_PORT: 3306
      QUIZ_HERO_DB_NAME: ${QUIZ_HERO_DB_NAME:-quiz_hero}
      QUIZ_HERO_DB_USER: ${QUIZ_HERO_DB_USER:-quiz_hero}
      QUIZ_HERO_DB_PASSWORD: ${QUIZ_HERO_DB_PASSWORD:-quiz_hero_local}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: php database/migrate.php

volumes:
  quiz_hero_mysql:
