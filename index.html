<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="container">
        <h1>Quiz-Guru</h1>
        <div id="js-category-container" class="category">
            <button class="category__btn" data-category="rom">Rom</button>
            <button class="category__btn" data-category="amalfi">Amalfi Küste</button>
            <button class="category__btn" data-category="neapel">Neapel</button>
            <button class="category__btn" data-category="florenz">Florenz</button>
            <button class="category__btn" data-category="siena">Siena</button>
        </div>
        <div id="js-quiz-content" class="quiz hide">
            <div class="quiz__score_container">
                <p id="js-score" class="quiz__score">Punkte: 0</p>
            </div>
            <p id="js-question" class="quiz__question"></p> 
            <img id="js-question-image" class="quiz__question_image hide" alt="Quiz Bild" />
            <div id="js-answers" class="quiz__answer">
                <button class="js-answer-btn quiz__answer_btn"></button>
                <button class="js-answer-btn quiz__answer_btn"></button>
                <button class="js-answer-btn quiz__answer_btn"></button>
                <button class="js-answer-btn quiz__answer_btn"></button>
            </div>
            <p id="js-feedback" class="quiz__feedback hide"></p>
            <button id="js-next-btn" class="quiz__next_btn hide">Nächste Frage</button>
            <button id="js-abort-btn" class="quiz__abort_btn">Abbrechen</button>
        </div>
        <script src="script.js"></script>
    </main>
</body>

</html>
