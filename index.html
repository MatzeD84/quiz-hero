<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main>
        <h1>Quiz-Guru</h1>
        <div id="category-container">
            <button class="category-btn" data-category="rom">Rom</button>
            <button class="category-btn" data-category="amalfi">Amalfi Küste</button>
            <button class="category-btn" data-category="neapel">Neapel</button>
            <button class="category-btn" data-category="florenz">Florenz</button>
            <button class="category-btn" data-category="siena">Siena</button>
        </div>
        <div id="quiz-content" class="hide">
            <p id="score">Punkte: 0</p>
            <p id="question"></p>
            <img id="question-image" class="hide" alt="Quiz Bild" />
            <div id="answers">
                <button class="answer-btn"></button>
                <button class="answer-btn"></button>
                <button class="answer-btn"></button>
                <button class="answer-btn"></button>
            </div>
            <p id="feedback" class="hide"></p>
            <button id="next-btn" class="hide">Nächste Frage</button>
            <button id="abort-btn">Abbrechen</button>
        </div>
        <script src="script.js"></script>
    </main>
</body>

</html>
