<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="category-container">
        <button class="category-btn" data-category="italien">Italien</button>
        <button class="category-btn" data-category="hamburg">Hamburg</button>
    </div>
    <div id="quiz-content" class="hide">
        <p id="score">Punktestand: 0</p>
        <p id="question"></p>
        <img id="question-image" class="hide" alt="Quiz Bild">
        <div id="answers">
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
            <button class="answer-btn"></button>
        </div>
        <p id="feedback" class="hide"></p>
        <button id="next-btn" class="hide">Weiter</button>
        <button id="abort-btn">Abbrechen</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
