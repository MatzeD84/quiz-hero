<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="container">
        <h1>Quiz-Guru</h1>
        <div id="js-category-container" class="category">
            <button class="js-category-btn btn btn--category" data-category="rom">Rom</button>
            <button class="js-category-btn btn btn--category" data-category="amalfi">Amalfi Küste</button>
            <button class="js-category-btn btn btn--category" data-category="neapel">Neapel</button>
            <button class="js-category-btn btn btn--category" data-category="florenz">Florenz</button>
            <button class="js-category-btn btn btn--category" data-category="siena">Siena</button>
        </div>
        <div id="js-question-count-container" class="question_count hide">
            <h2>Wähle die Anzahl der Fragen</h2>
            <div class="quiz__question_count_select">
                <button class="js-question-count-btn btn btn--question_count" data-count="5">5 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="10">10 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="25">25 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="all">Alle Fragen</button>
            </div>
            <div>
                <div id="js-back-to-category-page" class="question_count_back_btn" role="button">
                    <small>zurück</small>
                </div>
            </div>
        </div>
        <div id="js-quiz-content" class="quiz hide">
            <div class="quiz__score_container">
                <div class="quiz__counter_questions">
                    <p id="js-current-question">0</p>
                    <p id="js-total-questions">/0</p>
                </div>
                <div>
                    <p id="js-score" class="quiz__score">Punkte: 0</p>
                </div>
            </div>
            <div class="quiz__container">
                <div class="quiz__abort">
                    <div id="js-abort-btn" class="quiz__abort_btn" title="Quiz Abbrechen">
                        <svg class="quiz__abort_svg" clip-rule="evenodd" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2"
                        viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">^
                            <path d="m12 10.93 5.719-5.72c.146-.146.339-.219.531-.219.404 0 .75.324.75.749 0 .193-.073.385-.219.532l-5.72 5.719 5.719 5.719c.147.147.22.339.22.531 0 .427-.349.75-.75.75-.192 0-.385-.073-.531-.219l-5.719-5.719-5.719 5.719c-.146.146-.339.219-.531.219-.401 0-.75-.323-.75-.75 0-.192.073-.384.22-.531l5.719-5.719-5.72-5.719c-.146-.147-.219-.339-.219-.532 0-.425.346-.749.75-.749.192 0 .385.073.531.219z"/>
                        </svg>
                    </div>
                </div>
                <p id="js-question" class="quiz__question"></p>
                <div class="quiz__question_image_container">
                    <img id="js-question-image" class="quiz__question_image hide" alt="Quiz Bild" />
                </div>
                <div id="js-answers" class="quiz__answer">
                    <button class="js-answer-btn btn btn--quiz_answer"></button>
                    <button class="js-answer-btn btn btn--quiz_answer"></button>
                    <button class="js-answer-btn btn btn--quiz_answer"></button>
                    <button class="js-answer-btn btn btn--quiz_answer"></button>
                </div>
                <div class="quiz__feedback_container">
                    <svg id="js-feedback-icon-incorrect" class="quiz__feedback_icon hide" clip-rule="evenodd" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" viewBox="0 0 24 24" fill="var(--mandarin-color)" xmlns="http://www.w3.org/2000/svg">
                        <path d="m12.002 2.005c5.518 0 9.998 4.48 9.998 9.997 0 5.518-4.48 9.998-9.998 9.998-5.517 0-9.997-4.48-9.997-9.998 0-5.517 4.48-9.997 9.997-9.997zm0 1.5c-4.69 0-8.497 3.807-8.497 8.497s3.807 8.498 8.497 8.498 8.498-3.808 8.498-8.498-3.808-8.497-8.498-8.497zm0 7.425 2.717-2.718c.146-.146.339-.219.531-.219.404 0 .75.325.75.75 0 .193-.073.384-.219.531l-2.717 2.717 2.727 2.728c.147.147.22.339.22.531 0 .427-.349.75-.75.75-.192 0-.384-.073-.53-.219l-2.729-2.728-2.728 2.728c-.146.146-.338.219-.53.219-.401 0-.751-.323-.751-.75 0-.192.073-.384.22-.531l2.728-2.728-2.722-2.722c-.146-.147-.219-.338-.219-.531 0-.425.346-.749.75-.749.192 0 .385.073.531.219z" fill-rule="nonzero"/>
                    </svg>
                    <svg id="js-feedback-icon-correct" class="quiz__feedback_icon hide" clip-rule="evenodd" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" viewBox="0 0 24 24" fill="var(--greensea-color)" xmlns="http://www.w3.org/2000/svg">
                        <path d="m11.998 2.005c5.517 0 9.997 4.48 9.997 9.997 0 5.518-4.48 9.998-9.997 9.998-5.518 0-9.998-4.48-9.998-9.998 0-5.517 4.48-9.997 9.998-9.997zm0 1.5c-4.69 0-8.498 3.807-8.498 8.497s3.808 8.498 8.498 8.498 8.497-3.808 8.497-8.498-3.807-8.497-8.497-8.497zm-5.049 8.886 3.851 3.43c.142.128.321.19.499.19.202 0 .405-.081.552-.242l5.953-6.509c.131-.143.196-.323.196-.502 0-.41-.331-.747-.748-.747-.204 0-.405.082-.554.243l-5.453 5.962-3.298-2.938c-.144-.127-.321-.19-.499-.19-.415 0-.748.335-.748.746 0 .205.084.409.249.557z" fill-rule="nonzero"/>
                    </svg>
                    <p id="js-feedback" class="quiz__feedback hide"></p>
                </div>
                <div class="quiz__footer">
                    <button id="js-next-btn" class="btn btn--next hide">Nächste Frage</button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </main>
</body>
</html>
