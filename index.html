<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="category-container">
        <h1>Wähle eine Kategorie:</h1>
        <button onclick="selectCategory('italien')">Italien</button>
        <button onclick="selectCategory('hamburg')">Hamburg</button>
    </div>

    <div id="quiz-content" class="hide">
        <button id="abort-btn" onclick="abortQuiz()">Quiz abbrechen</button>
        <div id="question-container">
            <h2 id="question"></h2>
            <img id="question-image" class="hide" src="" alt="Bildfrage">
        </div>

        <div id="answers-container">
            <button class="answer-btn" onclick="selectAnswer(0)"></button>
            <button class="answer-btn" onclick="selectAnswer(1)"></button>
            <button class="answer-btn" onclick="selectAnswer(2)"></button>
            <button class="answer-btn" onclick="selectAnswer(3)"></button>
        </div>

        <button id="next-btn" class="btn hide" onclick="nextQuestion()">Weiter</button>
        <p id="score">Punktestand: 0</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
