<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz-Hero</title>

    <link rel="icon" type="image/png" href="/images/website/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/website/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/images/website/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/website/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Quiz-Hero" />
    <link rel="manifest" href="/images/website/favicon/site.webmanifest" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SYVZB974FC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SYVZB974FC');
    </script>

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20250210" />
</head>
<body>
    <main class="container">
        <!-- Kategorie-Auswahl -->
        <section id="js-category-container" class="main-section">
            <header class="main__header">
                <img class="main_image" src="images/website/logo-weihnachtsheld.png" alt="Logo">
                <h1 class="main_headline">Quiz-Hero</h1>
            </header>
            <section>
                <h2>Städte, Regionen und Landschaften</h2>
                <div class="category" aria-live="polite">
                    <!-- Buttons werden per JS generiert -->
                </div>
            </section>
            <section id="js-tag-container" class="tag-filter" aria-live="polite">
                <h2 class="tag-filter__headline">Themen</h2>
                <div class="category tag-filter__list">
                    <!-- Tag-Buttons werden per JS generiert -->
                </div>
            </section>
        </section>

        <!-- Auswahl Anzahl Fragen -->
        <section id="js-question-count-container" class="question_count hide" aria-live="polite">
            <header class="question_count__header">
                <img class="main_image" src="images/website/logo-weihnachtsheld.png" alt="Logo">
                <h2>Wähle die Anzahl der Fragen</h2>
            </header>
            <div class="question_count__meta">
                <div class="question_count__selection_wrapper">
                    <h3 id="js-selection-label" class="question_count__selection"></h3>
                    <p id="js-selection-description" class="question_count__description"></p>
                </div>
                <img id="js-selection-icon" class="question_count__icon hide" alt="">
            </div>
            <div class="quiz__question_count_select">
                <button class="js-question-count-btn btn btn--question_count" data-count="5">5 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="10">10 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="25">25 Fragen</button>
                <button class="js-question-count-btn btn btn--question_count" data-count="all">Alle Fragen</button>
            </div>
            <div>
                <button id="js-back-to-category-page" class="question_count_back_btn" type="button">
                    <small class="question_count_back_btn__text">zurück</small>
                </button>
            </div>
        </section>

        <!-- Quiz -->
        <section id="js-quiz-content" class="quiz hide" aria-live="polite">
            <header class="quiz__score_container">
                <div class="quiz__counter_questions">
                    <p id="js-current-question">0</p>
                    <p id="js-total-questions">/0</p>
                </div>
                <div class="quiz__headertext">
                    <p id="js-quiz-headertext"></p>
                    <p id="js-quiz-selection" class="quiz__selection"></p>
                </div>
                <p id="js-score" class="quiz__score">Punkte: 0</p>
            </header>

            <div class="quiz__container">
                <div class="quiz__abort">
                    <button id="js-abort-btn" class="quiz__abort_btn" title="Quiz abbrechen" type="button">
                        <svg class="quiz__abort_svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="m12 10.93 5.719-5.72c.146-.146.339-.219.531-.219.404 0 .75.324.75.749 0 .193-.073.385-.219.532l-5.72 5.719 5.719 5.719c.147.147.22.339.22.531 0 .427-.349.75-.75.75-.192 0-.385-.073-.531-.219l-5.719-5.719-5.719 5.719c-.146.146-.339.219-.531.219-.401 0-.75-.323-.75-.75 0-.192.073-.384.22-.531l5.719-5.719-5.72-5.719c-.146-.147-.219-.339-.219-.532 0-.425.346-.749.75-.749.192 0 .385.073.531.219z"/>
                        </svg>
                    </button>
                </div>

                <p id="js-question" class="quiz__question headline"></p>

                <div class="quiz__question_image_container">
                    <img id="js-question-image" class="quiz__question_image hide" alt="Quiz Bild" />
                </div>

                <div class="quiz__answer">
                    <button class="js-answer-btn btn btn--quiz_answer" type="button"></button>
                    <button class="js-answer-btn btn btn--quiz_answer" type="button"></button>
                    <button class="js-answer-btn btn btn--quiz_answer" type="button"></button>
                    <button class="js-answer-btn btn btn--quiz_answer" type="button"></button>
                </div>

                <div class="js-quiz-feedback-container quiz__feedback_container hide">
                    <svg id="js-feedback-icon-incorrect" class="quiz__feedback_icon hide" viewBox="0 0 24 24" fill="var(--mandarin-color)" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="m12.002 2.005c5.518 0 9.998 4.48 9.998 9.997 0 5.518-4.48 9.998-9.998 9.998-5.517 0-9.997-4.48-9.997-9.998 0-5.517 4.48-9.997 9.997-9.997zm0 1.5c-4.69 0-8.497 3.807-8.497 8.497s3.807 8.498 8.497 8.498 8.498-3.808 8.498-8.498-3.808-8.497-8.498-8.497zm0 7.425 2.717-2.718c.146-.146.339-.219.531-.219.404 0 .75.325.75.75 0 .193-.073.384-.219.531l-2.717 2.717 2.727 2.728c.147.147.22.339.22.531 0 .427-.349.75-.75.75-.192 0-.384-.073-.53-.219l-2.729-2.728-2.728 2.728c-.146.146-.338.219-.53.219-.401 0-.751-.323-.751-.75 0-.192.073-.384.22-.531l2.728-2.728-2.722-2.722c-.146-.147-.219-.338-.219-.531 0-.425.346-.749.75-.749.192 0 .385.073.531.219z"/>
                    </svg>
                    <svg id="js-feedback-icon-correct" class="quiz__feedback_icon hide" viewBox="0 0 24 24" fill="var(--greensea-color)" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="m11.998 2.005c5.517 0 9.997 4.48 9.997 9.997 0 5.518-4.48 9.998-9.997 9.998-5.518 0-9.998-4.48-9.998-9.998 0-5.517 4.48-9.997 9.998-9.997zm0 1.5c-4.69 0-8.498 3.807-8.498 8.497s3.808 8.498 8.498 8.498 8.497-3.808 8.497-8.498-3.807-8.497-8.497-8.497zm-5.049 8.886 3.851 3.43c.142.128.321.19.499.19.202 0 .405-.081.552-.242l5.953-6.509c.131-.143.196-.323.196-.502 0-.41-.331-.747-.748-.747-.204 0-.405.082-.554.243l-5.453 5.962-3.298-2.938c-.144-.127-.321-.19-.499-.19-.415 0-.748.335-.748.746 0 .205.084.409.249.557z"/>
                    </svg>
                    <p id="js-feedback" class="quiz__feedback hide"></p>
                </div>

                <footer class="quiz__footer">
                    <button id="js-next-btn" class="btn btn--next hide" type="button">Weiter</button>
                </footer>
                <details id="js-background-knowledge" class="background-knowledge hide">
                    <summary class="background-knowledge__summary">Interessant</summary>
                    <div class="background-knowledge__content"></div>
                </details>
            </div>
        </section>

        <!-- Ergebnis-Modal -->
        <section id="js-result-modal" class="modal hide" role="dialog" aria-modal="true">
            <div class="modal__content">
                <div class="modal__close">
                    <button id="js-modal-close" class="modal__close_btn" type="button" aria-label="Modal schließen">
                        <svg class="quiz__abort_svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="m12 10.93 5.719-5.72c.146-.146.339-.219.531-.219.404 0 .75.324.75.749 0 .193-.073.385-.219.532l-5.72 5.719 5.719 5.719c.147.147.22.339.22.531 0 .427-.349.75-.75.75-.192 0-.385-.073-.531-.219l-5.719-5.719-5.719 5.719c-.146.146-.339.219-.531.219-.401 0-.75-.323-.75-.75 0-.192.073-.384.22-.531l5.719-5.719-5.72-5.719c-.146-.147-.219-.339-.219-.532 0-.425.346-.749.75-.749.192 0 .385.073.531.219z"/>
                        </svg>
                    </button>
                </div>
                <div id="js-result-content"></div>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js?v=20250210"></script>
</body>
</html>
